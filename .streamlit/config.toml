# 
# .streamlit/config.toml
# Configurações Globais do Streamlit
# Data: 31 de março de 2026
# 

[client]
showErrorDetails = true

[logger]
level = "info"

[theme]
primaryColor = "#2D5A3D"
backgroundColor = "#0D2818"
secondaryBackgroundColor = "#1a3a2e"
textColor = "#E8E8E8"
font = "sans serif"

[server]
enableCORS = true
enableXsrfProtection = true

[runner]
fastReruns = true